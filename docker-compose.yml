services:
  warp-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-warp-socks5-proxy}:${DOCKER_TAG:-latest}
    container_name: warp-proxy

    # ── Required capabilities for TUN + routing ───────────────────────────────
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=0

    # ── WARP credentials (loaded from .env file) ─────────────────────────────
    environment:
      WARP_ORG: "${WARP_ORG}"
      CF_ACCESS_CLIENT_ID: "${CF_ACCESS_CLIENT_ID}"
      CF_ACCESS_CLIENT_SECRET: "${CF_ACCESS_CLIENT_SECRET}"
      WARP_CONNECTOR_TOKEN: "${WARP_CONNECTOR_TOKEN:-}"
      WARP_EXCLUDE_RANGES: "${WARP_EXCLUDE_RANGES:-}"
      WARP_ACCEPT_TOS: "true"
      SOCKS5_PORT: "${SOCKS5_PORT:-1080}"
      ALLOWED_RANGES: "${ALLOWED_RANGES:-0.0.0.0/0}"

    # ── Expose SOCKS5 port to the host LAN ───────────────────────────────────
    ports:
      - "${SOCKS5_LISTEN:-0.0.0.0}:${SOCKS5_PORT:-1080}:1080"

    # ── Keep the container running on failure ─────────────────────────────────
    restart: unless-stopped

    # ── Persist WARP registration across restarts ──────────────────
    volumes:
      - warp-data:/var/lib/cloudflare-warp

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "warp-cli --accept-tos status | grep -q Connected || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  warp-data:
    driver: local
