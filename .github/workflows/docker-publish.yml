name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Check daily at 06:00 UTC for new cloudflare-warp releases
    - cron: "0 6 * * *"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ── Detect the latest cloudflare-warp package version ──────────────────────
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      warp_version: ${{ steps.warp.outputs.version }}
      image_tag: ${{ steps.resolve.outputs.tag }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Query latest cloudflare-warp version from apt repo
        id: warp
        run: |
          # Add Cloudflare apt repo and query the candidate version
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor -o /usr/share/keyrings/cf-warp.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cf-warp.gpg] \
            https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq
          WARP_VER=$(apt-cache policy cloudflare-warp | grep Candidate | awk '{print $2}')
          echo "version=${WARP_VER}" >> "$GITHUB_OUTPUT"
          echo "Detected cloudflare-warp version: ${WARP_VER}"

      - name: Resolve image tag (git tag wins, else warp version + patch)
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Lowercase the image name – GHCR requires lowercase paths
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Using git tag: ${TAG}"
            exit 0
          fi

          BASE_TAG="${{ steps.warp.outputs.version }}"

          # Obtain a pull-scoped token from GHCR using GITHUB_TOKEN
          ghcr_token() {
            curl -sf -u "_:${GH_TOKEN}" \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${IMAGE_NAME_LC}:pull" \
              | jq -r '.token // empty'
          }

          # Check if a tag exists in GHCR
          tag_exists() {
            local token
            token=$(ghcr_token)
            if [[ -z "$token" ]]; then
              # Can't get token = package probably doesn't exist yet
              echo "  (no GHCR token – package may not exist yet)"
              return 1
            fi
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${IMAGE_NAME_LC}/manifests/$1")
            echo "  checking $1 -> HTTP $status"
            [[ "$status" == "200" ]]
          }

          # If the base tag doesn't exist yet, this is a new cloudflare-warp version – always build
          if ! tag_exists "$BASE_TAG"; then
            echo "tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${BASE_TAG} is new – will build"
            exit 0
          fi

          # Base tag already exists in GHCR.
          # On scheduled runs there is nothing new to ship – skip the build.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "Scheduled run: cloudflare-warp ${BASE_TAG} is already published. Skipping build."
            echo "tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Non-scheduled trigger (push / workflow_dispatch): find the next available patch number
          PATCH=1
          while tag_exists "${BASE_TAG}-patch-${PATCH}"; do
            echo "  ${BASE_TAG}-patch-${PATCH} exists, trying next..."
            PATCH=$((PATCH + 1))
            if [[ $PATCH -gt 100 ]]; then
              echo "::error::Exceeded 100 patch iterations – something is wrong"
              exit 1
            fi
          done

          FINAL_TAG="${BASE_TAG}-patch-${PATCH}"
          echo "tag=${FINAL_TAG}" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "Using patched tag: ${FINAL_TAG}"

  # ── Build & push the Docker image ─────────────────────────────────────────
  build-and-push:
    needs: detect-version
    if: needs.detect-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ needs.detect-version.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.detect-version.outputs.image_tag }}
            dev.warp.version=${{ needs.detect-version.outputs.warp_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
